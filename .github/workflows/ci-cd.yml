name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore FitLife.Identity.slnx

      - name: Build
        run: dotnet build FitLife.Identity.slnx --no-restore

      - name: Test
        run: dotnet test FitLife.Identity.Tests/FitLife.Identity.Tests.csproj --no-restore --no-build

  push-image:
    name: Push to DockerHub
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/fitlife-identity
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: FitLife.Identity.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trigger Infrastructure deploy
        run: |
          gh workflow run deploy.yml \
            --repo GoodChoiceExam/Infrastructure \
            --ref master
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_PAT }}
